name: resilience-prober-ci

on:
  push:
    paths:
      - "resilience_prober/**"
      - ".github/workflows/resilience_prober_ci.yml"
  pull_request:
    paths:
      - "resilience_prober/**"
      - ".github/workflows/resilience_prober_ci.yml"
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            resilience_prober/requirements.txt
            resilience_prober/requirements-dev.txt

      - name: Install dependencies
        working-directory: resilience_prober
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt
          python -m pip check

      - name: CLI smoke (list only)
        working-directory: resilience_prober
        run: make list

      - name: Lint
        working-directory: resilience_prober
        run: make lint

      - name: Run unit tests
        working-directory: resilience_prober
        run: make test
