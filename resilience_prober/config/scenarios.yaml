scenarios:
  nominal:
    sitl_start_location: "-35.363261,149.165230,584,353"
    environment:
      SIM_BARO_NOISE: 0.2
      SIM_GPS_NOISE: 0.2
      SIM_WIND_SPD: 2.0
      SIM_WIND_TURB: 0.1
      LOG_DISARMED: 1       # Force logging even while sitting on the ground
      LOG_BITMASK: 131071   # Force Maximum Telemetry (All Default + Fast ATT)
    mission:
      - lat: -35.363261
        lon: 149.165230
        alt: 50.0
      - lat: -35.360261
        lon: 149.165230
        alt: 50.0
      - lat: -35.360261
        lon: 149.168230
        alt: 50.0
      - lat: -35.363261
        lon: 149.168230
        alt: 50.0

  gps_denial_basic:
    sitl_start_location: "-35.363261,149.165230,584,353"
    environment:
      SIM_BARO_NOISE: 0.2
      SIM_GPS_NOISE: 0.2
      SIM_WIND_SPD: 2.0
      SIM_WIND_TURB: 0.1
      LOG_DISARMED: 1       # Force logging even while sitting on the ground
      LOG_BITMASK: 131071   # Force Maximum Telemetry (All Default + Fast ATT)
    fault_triggers:
